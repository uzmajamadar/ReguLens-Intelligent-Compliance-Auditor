services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: regulens
      POSTGRES_PASSWORD: regulens
      POSTGRES_DB: regulens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regulens"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://regulens:regulens@db:5432/regulens
      JWT_SECRET: change-me-in-production-use-a-long-random-string
      APP_URL: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173,http://localhost
      QDRANT_URL: http://qdrant:6333
      COLLECTION_NAME: regulens_policies
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@regulens.ai}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./storage:/app/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
  qdrant_data:
